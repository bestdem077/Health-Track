name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        # Gradle caching is temporarily disabled to avoid GitHub service 400/503 errors

    - name: Generate fresh Gradle Wrapper
      run: gradle wrapper --gradle-version 8.10

    - name: Setup Environment Variables
      run: |
        if [ -f .env.example ]; then
          cp .env.example .env
        else
          touch .env
        fi

    - name: Generate debug.keystore 
      # Since debug.keystore.base64 was deleted, we generate a fresh keystore during the build
      run: |
        if [ ! -f debug.keystore ]; then
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/*.apk
